<script>
console.log('BUILD_TAG: 2026-07-22e');

// ---------- ③ ロゴ／Castのタップで更新 ----------
document.getElementById('brand').onclick = loadJobs;
function setUpdatedAt(){} // ヘッダー表示は廃止（buildタグは最下部に表示）

// ============================================================
// 設定（ここだけ書き換える）
// ============================================================
const CONFIG = {
  // GASのWebアプリURL（/exec で終わるもの）を貼る
  GAS_URL: 'https://script.google.com/macros/s/AKfycbyKXod-eJoMSsFRLud1QC-OvqmrL4KTxhC9Tvqjp0EeAMwhp1D44hi-yZy6tw-bnsXmJg/exec',
  // GASのスクリプトプロパティ API_TOKEN と同じ文字列を貼る
  TOKEN: 'XJqTnty4gi3xcVp9GjmoPgaayCa5BjOp'
};
// ============================================================

// PWAマニフェスト（単一HTML構成のためJSで注入）
(function(){
  const manifest = {
    name: 'Cast',
    short_name: 'Cast',
    start_url: location.origin + location.pathname,
    display: 'standalone',
    background_color: '#121417',
    theme_color: '#121417',
    icons: [
      { src: location.origin + '/icon-192.png', sizes: '192x192', type: 'image/png', purpose: 'any' },
      { src: location.origin + '/icon-512.png', sizes: '512x512', type: 'image/png', purpose: 'any' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
})();

// ============================================================
// GAS API 通信
// ============================================================
async function api(action, extra){
  const payload = Object.assign({ token: CONFIG.TOKEN, action: action }, extra || {});
  const res = await fetch(CONFIG.GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data && data.error === 'unauthorized') throw new Error('認証エラー：TOKENがGAS側のAPI_TOKENと一致していません');
  return data;
}

function configOk(){
  return CONFIG.GAS_URL.indexOf('https://') === 0 && CONFIG.TOKEN.length > 5 && CONFIG.TOKEN.indexOf('ここに') === -1;
}

// ============================================================
// 画面ロジック
// ============================================================
let JOBS = [];
let filterStatus = 'todo';
let filterGenre = null;

function loadJobs(){
  if(!configOk()){
    document.getElementById('list').innerHTML =
      '<div class="config-warn">⚙️ 初期設定が必要です。<br>index.html 内の CONFIG に GASのURL（/exec）と TOKEN を貼ってから、GitHubにアップロードしてください。</div>';
    return;
  }

  // 前回取得した一覧が端末に残っていれば、まずそれを即表示（体感を高速化）
  let hadCache = false;
  try{
    const saved = localStorage.getItem('cast_jobs');
    if(saved){
      JOBS = JSON.parse(saved);
      render();
      hadCache = true;
      showToastMsg('最新を確認中…');
    }
  }catch(e){}
  if(!hadCache){
    document.getElementById('list').innerHTML = '<div class="loading">案件を読み込み中…</div>';
  }

  // 裏で最新を取得して差し替え
  api('jobs').then(function(data){
    JOBS = (data && data.jobs) || [];
    try{ localStorage.setItem('cast_jobs', JSON.stringify(JOBS)); }catch(e){}
    render();
    if(hadCache) showToastMsg('最新に更新しました');
  }).catch(function(e){
    if(!hadCache){
      document.getElementById('list').innerHTML = '<div class="empty">読み込みエラー：'+esc(String(e.message||e))+'</div>';
    }else{
      showToastMsg('更新に失敗（前回のデータを表示中）');
    }
  });
}

// ④ 締切切れ判定：サーバーのexpiredフラグに加え、締切日（M/d）からも判定する保険
function isExpired(j){
  if(j.expired) return true;
  const d = String(j.deadline||'').match(/^(\d{1,2})\/(\d{1,2})$/);
  if(!d) return false;
  const now = new Date();
  const cand = new Date(now.getFullYear(), Number(d[1])-1, Number(d[2]), 23, 59, 59);
  const diff = now - cand; // 過去ならプラス
  // 過去300日以内に締切が来ていたら期限切れ（それ以上前なら来年の日付とみなす）
  return diff > 0 && diff < 300*24*60*60*1000;
}

// ① 継続案件の判定（タイトル・概要のキーワードから推定）
function isContinuous(j){
  const hay = String(j.title||'') + ' ' + String(j.summary||'');
  return /継続|長期|リピート|毎月|毎週|定期|月\s*\d+\s*(本|記事|件|回)|レギュラー/.test(hay);
}

// 応募優先度スコア（A案・ルールベース／無料・即時）
// 配点：ジャンル一致+2／報酬 下限5万以上+2・1万以上+1／契約枠がまだ0人+1
//       認定クライアント+1／契約歴あり+2／継続キーワード+1（最大9点）
function scoreJob(j){
  let s = 0;
  if(['ライティング','HP制作','GAS・自動化','SEOコンサル','AI活用'].indexOf(j.genre)!==-1) s += 2;
  const m = String(j.reward||'').replace(/,/g,'').match(/(\d+)\s*円/);
  if(m){ const v = Number(m[1]); if(v>=50000) s+=2; else if(v>=10000) s+=1; }
  const e = String(j.entry||'').match(/契約\s*(\d+)\s*\/\s*(\d+)/);
  if(e && Number(e[1])===0) s+=1;
  if(j.certified) s+=1;
  if(j.contract) s+=2;
  if(isContinuous(j)) s+=1;
  return s;
}
// 5点以上=高／3〜4点=中／2点以下=低
function prioHtml(j){
  const s = scoreJob(j);
  if(s>=5) return '<span class="prio prio-high">優先度 高</span>';
  if(s>=3) return '<span class="prio prio-mid">優先度 中</span>';
  return '<span class="prio prio-low">優先度 低</span>';
}

// 今日0時・今週（月曜0時）の境界を返す
function timeBounds(){
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const dow = (now.getDay() + 6) % 7; // 月曜=0
  const weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dow).getTime();
  return { todayStart: todayStart, weekStart: weekStart };
}

function render(){
  const tb = timeBounds();
  // 募集終了（closed）は一覧に一切載せない
  const visible = JOBS.filter(function(j){ return !j.closed; });
  // 全案件・未応募のカウントは期限切れを含めない
  const active = visible.filter(function(j){ return !isExpired(j); });
  const total = active.length;
  const todo = active.filter(function(j){ return j.status!=='応募済み'; }).length;
  // 今日・今週の応募数（応募日時ベース。週は月曜0時でリセット）
  const applied = JOBS.filter(function(j){ return j.status==='応募済み' && j.appliedTs; });
  const week = applied.filter(function(j){ return j.appliedTs >= tb.weekStart; }).length;
  const today = applied.filter(function(j){ return j.appliedTs >= tb.todayStart; }).length;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-todo').textContent = todo;
  document.getElementById('s-week').textContent = week;
  document.getElementById('s-today').textContent = today;

  let shown = visible.slice();
  if(filterStatus==='all') shown = shown.filter(function(j){return !isExpired(j);});
  if(filterStatus==='todo') shown = shown.filter(function(j){return j.status!=='応募済み' && !isExpired(j);});
  if(filterStatus==='done') shown = shown.filter(function(j){return j.status==='応募済み';});
  if(filterStatus==='week') shown = shown.filter(function(j){return j.status==='応募済み' && j.appliedTs && j.appliedTs >= timeBounds().weekStart;});
  if(filterStatus==='today') shown = shown.filter(function(j){return j.status==='応募済み' && j.appliedTs && j.appliedTs >= timeBounds().todayStart;});
  if(filterGenre) shown = shown.filter(function(j){return j.genre===filterGenre;});

  // 優先度スコアの高い順に並べ替え（同点は新着順のまま）。応募済み系の一覧は従来どおり
  if(filterStatus==='all' || filterStatus==='todo'){
    shown.sort(function(a,b){ return scoreJob(b) - scoreJob(a); });
  }

  const list = document.getElementById('list');
  if(shown.length===0){ list.innerHTML='<div class="empty">該当する案件はありません</div>'; return; }

  list.innerHTML='';
  shown.forEach(function(j){
    const applied = j.status==='応募済み';
    const card = document.createElement('div');
    card.className='card'+(applied?' applied':'');
    const badge = applied ? '<span class="badge done">応募済み</span>' : '<span class="badge todo">未応募</span>';
    const clientLine = j.clientName
      ? '<div class="card-client">👤 '+esc(j.clientName)+(j.certified?' <span class="cert-mark">認定</span>':'')+'</div>'
      : '';
    const contractTag = j.contract ? '<div class="contract-tag">🤝 契約歴あり（'+esc(j.contract)+'）</div>' : '';
    card.innerHTML =
      '<div class="card-top"><span class="platform">'+esc(j.platform)+'</span><span style="display:flex; gap:6px; align-items:center;">'+(applied?'':prioHtml(j))+badge+'</span></div>'+
      '<div class="title">'+esc(j.title)+'</div>'+
      clientLine+contractTag+
      '<div class="meta"><span>💰 '+esc(j.reward||'応相談')+'</span><span>📅 〜'+esc(j.deadline)+'</span><span>'+esc(j.entry||'')+'</span></div>'+
      '<div class="card-foot"><span><span class="genre-tag">'+esc(j.genre)+'</span>'+(isContinuous(j)?'<span class="cont-tag">🔁 継続あり</span>':'')+'</span><button class="hide-btn" data-row="'+j.row+'">非表示</button></div>';
    card.onclick = function(e){
      if(e.target && e.target.classList.contains('hide-btn')){
        e.stopPropagation();
        openHideMenu(j);
        return;
      }
      openSheet(j);
    };
    list.appendChild(card);
  });
}

function setStatusFilter(f){
  filterStatus = f;
  document.querySelectorAll('.fbtn[data-f]').forEach(function(b){
    b.classList.toggle('active', b.dataset.f===f);
  });
  document.querySelectorAll('.stat').forEach(function(s){
    s.classList.toggle('active', s.dataset.sf===f);
  });
  render();
}
document.querySelectorAll('.stat').forEach(function(s){
  s.onclick = function(){ setStatusFilter(s.dataset.sf); };
});

document.querySelectorAll('.fbtn').forEach(function(btn){
  btn.onclick = function(){
    if(btn.dataset.f){
      setStatusFilter(btn.dataset.f);
      return;
    } else if(btn.dataset.g){
      if(filterGenre===btn.dataset.g){ filterGenre=null; btn.classList.remove('active'); }
      else {
        document.querySelectorAll('.fbtn[data-g]').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active'); filterGenre=btn.dataset.g;
      }
    }
    render();
  };
});

const overlay = document.getElementById('overlay');
let currentJob = null;

function isLancers(job){ return String(job.platform||'').indexOf('ランサーズ') !== -1; }

function openSheet(job){
  currentJob = job;
  document.getElementById('sheet-title').textContent = job.title;
  const lancers = isLancers(job);
  // 初期表示：概要＋ローディング表示。詳細は非同期で差し替え
  // 一覧で取得済みのクライアント名があれば、開いた瞬間にそれを表示する
  let html = '';
  if(job.contract){
    html += contractWarnHtml(job.contract, job.contractMemo);
  }
  if(job.clientName){
    html += '<div id="client-line" class="client-line">👤 ' + esc(job.clientName) + (job.certified ? ' <span class="cert-mark">認定</span>' : '') + '</div>';
  } else if(!lancers){
    html += '<div id="client-line" class="client-line">👤 クライアント名を取得中…</div>';
  }
  html += '<div id="full-body" class="job-detail">'+esc(job.summary||'（概要なし）')
        + (lancers ? '' : '<div class="loading-inline">📄 募集文の全文を読み込み中…</div>')
        + '</div>';
  html += '<a class="sheet-link" href="'+esc(job.url)+'" target="_blank" rel="noopener">🔗 案件ページを開く</a>';
  if(lancers){
    // ランサーズは自動取得不可のため、募集本文の手動貼り付けで生成の質を上げる
    html += '<div class="paste-hint">📋 ランサーズは募集文を自動取得できません。上のリンクから案件ページを開き、募集本文をコピーして下に貼り付けると、内容に沿った応募文を作成できます（貼り付けなしでも概要だけで作成可能）。</div>';
    html += '<textarea class="paste-area" id="paste-area" placeholder="ここに募集本文を貼り付け（任意）"></textarea>';
  }
  if(job.status==='応募済み' && job.body){
    html += renderResult(job.body, true, job.note);
  } else {
    html += '<button class="gen-btn" id="genbtn">応募文作成</button>';
  }
  document.getElementById('sheet-body').innerHTML = html;
  overlay.classList.add('show');
  document.body.classList.add('modal-open');
  bindSheetButtons();

  if(lancers) return; // ランサーズは自動取得しない

  // 非同期で全文＋クライアント名を取得して表示を差し替え
  api('detail', { url: job.url }).then(function(detail){
    if(!detail) return;
    if(detail.contract && !document.getElementById('contract-warn')){
      currentJob.contract = detail.contract;
      currentJob.contractMemo = detail.contractMemo || '';
      const sb = document.getElementById('sheet-body');
      if(sb) sb.insertAdjacentHTML('afterbegin', contractWarnHtml(detail.contract, detail.contractMemo));
    }
    const cl = document.getElementById('client-line');
    if(cl){
      // 個別ページの名前を優先。取れなければ一覧で取得済みの名前を残す
      const name = detail.client || job.clientName || '';
      if(name){
        cl.innerHTML = '👤 ' + esc(name) + (job.certified ? ' <span class="cert-mark">認定</span>' : '');
      } else {
        cl.textContent = '👤 クライアント名：取得できませんでした';
      }
    }
    const fb = document.getElementById('full-body');
    if(fb && detail.body){
      fb.textContent = detail.body;
    } else if(fb && !detail.body){
      fb.textContent = (job.summary || '') + '\n\n（全文は取得できなかったため概要を表示しています）';
    }
  }).catch(function(){
    const cl = document.getElementById('client-line');
    if(cl && job.clientName){
      cl.innerHTML = '👤 ' + esc(job.clientName) + (job.certified ? ' <span class="cert-mark">認定</span>' : '');
    } else if(cl){
      cl.textContent = '👤 クライアント名：取得失敗';
    }
  });
}

function renderResult(body, applied, note){
  let html='';
  if(note) html += '<div class="note-msg">📝 操作メモ：'+esc(note)+'</div>';
  if(body.indexOf('【応募不可】')===0){
    return '<div class="skip-msg">⚠️ '+esc(body.replace('【応募不可】',''))+'<br><span style="font-size:12.5px;opacity:.85;">AIが応募不可と判断しましたが、内容を確認のうえ応募することもできます。</span></div>'
      + '<button class="force-btn" id="forcebtn">それでも応募文を作成する</button>';
  }
  html += '<div class="result-head"><span class="result-label">✅ 応募文'+(applied?'（応募済み）':'（作成しました）')+'</span><button class="copy-btn-top" id="copybtn">コピー</button></div>';
  html += '<div class="app-text" id="apptext">'+esc(body)+'</div>';
  html += '<div class="sub-actions"><button class="mini-btn" id="regenbtn">作り直す</button>';
  if(applied) html += '<button class="mini-btn" id="undobtn">未応募に戻す</button>';
  html += '</div>';
  return html;
}

function bindSheetButtons(){
  const g=document.getElementById('genbtn');
  if(g) g.onclick=doGenerate;
  const c=document.getElementById('copybtn');
  if(c) c.onclick=function(){ copyText(currentJob.body); };
  const r=document.getElementById('regenbtn');
  if(r) r.onclick=doRegenerate;
  const u=document.getElementById('undobtn');
  if(u) u.onclick=doUndo;
  const f=document.getElementById('forcebtn');
  if(f) f.onclick=doForceGenerate;
}

function contractWarnHtml(status, memo){
  return '<div id="contract-warn" class="contract-warn">🤝 <b>契約歴のあるクライアントです（'+esc(status)+'）</b>'
    + (memo ? '<br>'+esc(memo) : '') + '</div>';
}

function getPastedText(){
  const ta = document.getElementById('paste-area');
  return ta ? ta.value.trim() : '';
}
function doGenerate(){
  if(currentJob.contract && !confirm('契約歴のあるクライアント（'+currentJob.contract+'）です。\n応募文を作成しますか？')) return;
  const pasted = getPastedText();
  showTyping();
  api('generate', { row: currentJob.row, pasted: pasted }).then(handleResult).catch(failHandler);
}
function doForceGenerate(){
  const pasted = getPastedText();
  showTyping();
  api('regenerate', { row: currentJob.row, pasted: pasted, force: 1 }).then(handleResult).catch(failHandler);
}
function doRegenerate(){
  const pasted = getPastedText();
  showTyping();
  api('regenerate', { row: currentJob.row, pasted: pasted }).then(handleResult).catch(failHandler);
}
function doUndo(){
  api('unapply', { row: currentJob.row }).then(function(){
    currentJob.status='未応募'; currentJob.body='';
    const idx=JOBS.findIndex(function(j){return j.row===currentJob.row;});
    if(idx>=0){ JOBS[idx].status='未応募'; JOBS[idx].body=''; }
    saveLocalJobs();
    render(); openSheet(currentJob);
  }).catch(failHandler);
}

function showTyping(){
  document.getElementById('sheet-body').innerHTML =
    '<div class="job-detail">'+esc(currentJob.summary||'')+'</div>'+
    '<a class="sheet-link" href="'+esc(currentJob.url)+'" target="_blank" rel="noopener">🔗 案件ページを開く</a>'+
    '<div class="typing-box"><span></span><span></span><span></span></div>';
}
function saveLocalJobs(){ try{ localStorage.setItem('cast_jobs', JSON.stringify(JOBS)); }catch(e){} }

function handleResult(res){
  if(res.error){
    document.getElementById('sheet-body').innerHTML += '<div class="skip-msg">エラー：'+esc(res.error)+'</div>';
    return;
  }
  currentJob.body=res.body; currentJob.status=res.status; currentJob.note=res.note||'';
  const idx=JOBS.findIndex(function(j){return j.row===currentJob.row;});
  if(idx>=0){ JOBS[idx].status=res.status; JOBS[idx].body=res.body; JOBS[idx].note=res.note||''; }
  // 今日・今週の応募数を再読み込みなしで反映
  if(res.status==='応募済み'){
    currentJob.appliedTs = Date.now();
    if(idx>=0) JOBS[idx].appliedTs = currentJob.appliedTs;
  }
  saveLocalJobs();
  document.getElementById('sheet-body').innerHTML =
    '<div class="job-detail">'+esc(currentJob.summary||'')+'</div>'+
    '<a class="sheet-link" id="open-after" href="'+esc(currentJob.url)+'" target="_blank" rel="noopener">🔗 案件ページを開く</a>'+
    (isLancers(currentJob) ? '<textarea class="paste-area" id="paste-area" placeholder="作り直す場合：募集本文を貼り付け（任意）"></textarea>' : '')+
    renderResult(res.body, true, res.note);
  bindSheetButtons();
  // 案件ページを開いたらシートを閉じて最新情報に更新（戻ってきたら一覧がすぐ使える）
  const oa = document.getElementById('open-after');
  if(oa) oa.onclick = function(){ setTimeout(function(){ closeSheet(); loadJobs(); }, 100); };
  render();
  // 生成できたら応募文を自動でコピー（応募不可のときは除く）
  if(res.body && res.body.indexOf('【応募不可】')!==0){
    autoCopy(res.body);
  }
}

// 生成直後の自動コピー。ブラウザに拒否されたら旧方式で再試行し、
// それでもダメなら静かに終了（手動の「コピー」ボタンで対応してもらう）
function autoCopy(text){
  function legacy(){
    try{
      const ta=document.createElement('textarea');
      ta.value=text; ta.setAttribute('readonly','');
      ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      let ok=false;
      try{ ok=document.execCommand('copy'); }catch(e){ ok=false; }
      document.body.removeChild(ta);
      if(ok) showToastMsg('応募文をコピーしました');
    }catch(e){}
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      showToastMsg('応募文をコピーしました');
    }).catch(legacy);
  } else {
    legacy();
  }
}
function failHandler(e){
  document.getElementById('sheet-body').innerHTML += '<div class="skip-msg">通信エラー：'+esc(String(e.message||e))+'</div>';
}

function closeSheet(){ overlay.classList.remove('show'); document.body.classList.remove('modal-open'); }
overlay.onclick=function(e){ if(e.target===overlay) closeSheet(); };

// 非表示メニュー

const reasonOverlay = document.getElementById('reason-overlay');
function openHideMenu(job){
  hideTargetJob = job;
  document.getElementById('reason-target').textContent = job.title;
  reasonOverlay.classList.add('show');
}
function closeHideMenu(){
  reasonOverlay.classList.remove('show');
  hideTargetJob = null;
}
reasonOverlay.onclick = function(e){ if(e.target===reasonOverlay) closeHideMenu(); };
document.querySelectorAll('.reason-item').forEach(function(btn){
  btn.onclick = function(){
    if(!hideTargetJob) return;
    const reason = btn.dataset.r;
    const row = hideTargetJob.row;
    const url = hideTargetJob.url;
    // ローカルでも即座に消す（再読み込みなしで反映）
    JOBS = JOBS.filter(function(x){ return x.url !== url; });
    saveLocalJobs();
    closeHideMenu();
    render();
    showToastMsg('非表示にしました');
    api('hide', { row: row, reason: reason }).catch(function(){
      showToastMsg('保存に失敗しました');
    });
  };
});

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showToast).catch(function(){ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); showToast(); }catch(e){}
  document.body.removeChild(ta);
}
const toast=document.getElementById('toast');
function showToast(){ toast.textContent='コピーしました！'; toast.classList.add('show'); setTimeout(function(){toast.classList.remove('show');},1500); }
function showToastMsg(msg){ toast.textContent=msg; toast.classList.add('show'); setTimeout(function(){toast.classList.remove('show');},1500); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const settingsOverlay = document.getElementById('settings-overlay');
let SET_MASTER = [];               // カテゴリーマスタ（GASから取得）
let SET_CHECKED = {};              // { カテゴリーID: true }
let SET_KWS = [];                  // [{ value, exclude }]
let SET_COMMON_EXCLUDE = '';       // カテゴリー共通の除外キーワード

function openSettings(){
  settingsOverlay.classList.add('show');
  document.body.classList.add('modal-open');
  document.getElementById('settings-body').innerHTML = '<div class="loading">設定を読み込み中…</div>';
  api('searchSettings').then(function(data){
    if(data && data.error) throw new Error(data.error);
    SET_MASTER = (data && data.master) || [];
    SET_CHECKED = {}; SET_KWS = []; SET_COMMON_EXCLUDE = '';
    ((data && data.rows) || []).forEach(function(r){
      if(r.type==='カテゴリー'){
        SET_CHECKED[String(r.value)] = true;
        if(!SET_COMMON_EXCLUDE && r.exclude) SET_COMMON_EXCLUDE = r.exclude;
        // マスタにないIDは手動追加分として一覧に加える
        if(!SET_MASTER.some(function(m){ return String(m.id)===String(r.value); })){
          SET_MASTER.push({ id: r.value, name: r.label || ('カテゴリーID '+r.value) });
        }
      } else if(r.type==='キーワード'){
        SET_KWS.push({ value: r.value, exclude: r.exclude || '' });
      }
    });
    if(SET_KWS.length===0) SET_KWS.push({ value:'', exclude:'' });
    renderSettings();
  }).catch(function(e){
    document.getElementById('settings-body').innerHTML =
      '<div class="skip-msg">設定を読み込めませんでした：'+esc(String(e.message||e))+
      '<br><span style="font-size:12.5px;opacity:.85;">GAS側に検索設定の機能（08番ファイル＋03番の3行追加）が反映され、再デプロイされているか確認してください。</span></div>';
  });
}
function closeSettings(){ settingsOverlay.classList.remove('show'); document.body.classList.remove('modal-open'); }
settingsOverlay.onclick = function(e){ if(e.target===settingsOverlay) closeSettings(); };

function renderSettings(){
  let html = '';
  html += '<div class="set-section"><div class="set-title">📂 カテゴリーで取得</div>';
  html += '<div class="set-desc">チェックしたカテゴリーの新着案件を自動取得します（複数選択OK）。</div>';
  html += '<div id="cat-list">';
  SET_MASTER.forEach(function(m){
    const ck = !!SET_CHECKED[String(m.id)];
    html += '<label class="cat-item'+(ck?' checked':'')+'"><input type="checkbox" data-cid="'+esc(m.id)+'"'+(ck?' checked':'')+'> '+esc(m.name)+'</label>';
  });
  html += '</div>';
  html += '<div class="set-desc" style="margin-top:10px;">一覧にないカテゴリーはIDで追加できます（クラウドワークスでカテゴリーを開き、URLの category_id= の数字）。</div>';
  html += '<div style="display:flex; gap:6px;"><input class="set-input" id="custom-cat-id" placeholder="ID（数字）" inputmode="numeric" style="width:110px;"><input class="set-input" id="custom-cat-name" placeholder="カテゴリー名（メモ用）" style="flex:1;"><button class="kw-del" style="color:var(--green); border-color:var(--green);" onclick="addCustomCat()">追加</button></div>';
  html += '<div class="set-desc" style="margin-top:10px;">カテゴリー共通の除外キーワード（スペース区切り）</div>';
  html += '<input class="set-input" id="common-exclude" placeholder="例：アンケート モニター SNS" value="'+esc(SET_COMMON_EXCLUDE)+'">';
  html += '</div>';

  html += '<div class="set-section"><div class="set-title">🔍 キーワードで取得</div>';
  html += '<div class="set-desc">スペース区切りで複数語OK。1枠＝1つの検索条件になります。</div>';
  html += '<div id="kw-list">';
  SET_KWS.forEach(function(k, i){
    html += '<div class="kw-row">'
      + '<input class="set-input" data-kwi="'+i+'" data-kf="value" placeholder="例：SEO ライティング 記事" value="'+esc(k.value)+'">'
      + '<input class="set-input" data-kwi="'+i+'" data-kf="exclude" placeholder="除外キーワード（任意）" value="'+esc(k.exclude)+'">'
      + '<button class="kw-del" onclick="delKw('+i+')">この枠を削除</button>'
      + '</div>';
  });
  html += '</div>';
  html += '<button class="kw-add" onclick="addKw()">＋ キーワード枠を追加</button>';
  html += '</div>';

  html += '<div class="set-save-row">'
    + '<button class="gen-btn" style="flex:1;" onclick="saveSettings(false)">保存</button>'
    + '<button class="gen-btn" style="flex:1.4; background:transparent; color:var(--green); border:1.5px solid var(--green);" onclick="saveSettings(true)">保存して今すぐ取得</button>'
    + '</div>';
  html += '<div class="set-note">・保存すると次回の自動取得（朝・昼・夕）から新しい条件で収集されます。<br>・「保存して今すぐ取得」は条件数によって30秒〜1分ほどかかります。<br>・ランサーズはメール通知経由のため、この設定の対象外です（ランサーズ側の通知メール設定で変更）。</div>';

  document.getElementById('settings-body').innerHTML = html;

  document.querySelectorAll('#cat-list input[type=checkbox]').forEach(function(cb){
    cb.onchange = function(){
      SET_CHECKED[cb.dataset.cid] = cb.checked;
      cb.closest('.cat-item').classList.toggle('checked', cb.checked);
    };
  });
  document.querySelectorAll('#kw-list .set-input').forEach(function(inp){
    inp.oninput = function(){ SET_KWS[Number(inp.dataset.kwi)][inp.dataset.kf] = inp.value; };
  });
}

function addCustomCat(){
  const id = document.getElementById('custom-cat-id').value.trim();
  const name = document.getElementById('custom-cat-name').value.trim();
  if(!/^\d+$/.test(id)){ showToastMsg('カテゴリーIDは数字で入力してください'); return; }
  if(!SET_MASTER.some(function(m){ return String(m.id)===id; })){
    SET_MASTER.push({ id: Number(id), name: name || ('カテゴリーID '+id) });
  }
  SET_CHECKED[id] = true;
  SET_COMMON_EXCLUDE = document.getElementById('common-exclude').value;
  renderSettings();
}
function addKw(){
  SET_COMMON_EXCLUDE = document.getElementById('common-exclude').value;
  SET_KWS.push({ value:'', exclude:'' });
  renderSettings();
}
function delKw(i){
  SET_COMMON_EXCLUDE = document.getElementById('common-exclude').value;
  SET_KWS.splice(i, 1);
  if(SET_KWS.length===0) SET_KWS.push({ value:'', exclude:'' });
  renderSettings();
}

function saveSettings(andFetch){
  SET_COMMON_EXCLUDE = document.getElementById('common-exclude').value.trim();
  const rows = [];
  SET_MASTER.forEach(function(m){
    if(SET_CHECKED[String(m.id)]){
      rows.push({ type:'カテゴリー', value:String(m.id), label:m.name, exclude:SET_COMMON_EXCLUDE });
    }
  });
  SET_KWS.forEach(function(k){
    const v = String(k.value||'').trim();
    if(v) rows.push({ type:'キーワード', value:v, label:v.slice(0,30), exclude:String(k.exclude||'').trim() });
  });
  if(rows.length===0){ showToastMsg('カテゴリーかキーワードを最低1つ設定してください'); return; }

  document.getElementById('settings-body').innerHTML =
    '<div class="loading">'+(andFetch?'保存して案件を取得中…（30秒〜1分ほどかかります）':'保存中…')+'</div>'
    + '<div class="typing-box"><span></span><span></span><span></span></div>';

  api('saveSearchSettings', { rows: rows }).then(function(res){
    if(res && res.error) throw new Error(res.error);
    if(!andFetch){
      showToastMsg('検索設定を保存しました');
      closeSettings();
      return;
    }
    return api('runFetch').then(function(fr){
      if(fr && fr.error) throw new Error(fr.error);
      showToastMsg('取得完了：新規 '+((fr&&fr.added)!=null?fr.added:'?')+'件');
      closeSettings();
      loadJobs();
    });
  }).catch(function(e){
    document.getElementById('settings-body').innerHTML =
      '<div class="skip-msg">エラー：'+esc(String(e.message||e))+'</div>';
  });
}

loadJobs();
</script>
</body>
</html>
