<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body.modal-open { overflow:hidden; }
  :root {
    --green:#06c755; --green-soft:rgba(6,199,85,.16); --green-dark:#3ddc84;
    --bg:#121417; --card:#1c2026; --text:#e8eaed; --muted:#9aa3b0; --border:#2c323b;
    --amber:#e6bd5c; --amber-soft:rgba(230,189,92,.14);
  }
  body { font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--text); padding-bottom:calc(20px + env(safe-area-inset-bottom)); }

  .topbar { position:sticky; top:0; z-index:10; }
  .header { background:var(--card); padding:calc(14px + env(safe-area-inset-top)) 16px 12px; border-bottom:1px solid var(--border); }
  .hrow { display:flex; align-items:center; gap:11px; }
  .logo { width:42px; height:42px; border-radius:11px; background:var(--green); color:#04310f; font-weight:800; font-size:24px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header h1 { font-size:21px; font-weight:700; letter-spacing:0.02em; line-height:1.2; }
  .hrow { cursor:pointer; user-select:none; -webkit-user-select:none; }
  .hrow:active { opacity:0.7; }
  .reload { float:right; font-size:14px; color:var(--green); background:none; border:1px solid var(--green); border-radius:8px; padding:5px 12px; cursor:pointer; margin-top:env(safe-area-inset-top); }

  .stats { display:flex; gap:7px; padding:10px 12px; background:var(--card); border-bottom:1px solid var(--border); }
  .stat { flex:1; text-align:center; background:var(--bg); border-radius:10px; padding:8px 4px; border:1px solid transparent; cursor:pointer; }
  .stat.active { border-color:var(--green); }
  .stat .num { font-size:26px; font-weight:600; }
  .stat .lbl { font-size:12px; color:var(--muted); margin-top:1px; }

  .filters { display:flex; gap:6px; padding:10px 14px; background:var(--card); border-bottom:1px solid var(--border); overflow-x:auto; }
  .fbtn { white-space:nowrap; font-size:14px; padding:9px 14px; border-radius:8px; border:1px solid var(--border); background:#fff; color:var(--muted); cursor:pointer; }
  .fbtn.active { background:var(--green); border-color:var(--green); color:#04310f; font-weight:600; }

  .list { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
  .loading,.empty { text-align:center; color:var(--muted); font-size:15px; padding:40px 20px; }
  .config-warn { margin:14px; background:#3a1f1f; color:#f3b4b4; font-size:15px; padding:14px; border-radius:12px; line-height:1.7; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:13px 14px; cursor:pointer; }
  .card:active { opacity:0.85; }
  .card.applied { background:#171b20; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:6px; }
  .platform { font-size:12px; color:var(--muted); border:1px solid var(--border); padding:1px 7px; border-radius:6px; white-space:nowrap; }
  .title { font-size:16.5px; font-weight:600; line-height:1.45; }
  .meta { font-size:13px; color:var(--muted); margin-top:6px; display:flex; flex-wrap:wrap; gap:4px 10px; }
  .card-client { font-size:13px; color:var(--text); margin-top:6px; padding:4px 8px; background:rgba(230,189,92,.12); border-radius:6px; display:inline-flex; align-items:center; gap:6px; }
  .cert-mark { background:var(--green); color:#fff; font-size:11px; font-weight:600; padding:1px 6px; border-radius:8px; }
  .genre-tag { display:inline-block; font-size:12px; padding:2px 8px; border-radius:6px; background:var(--green-soft); color:var(--green-dark); margin-top:8px; }
  .card-foot { display:flex; justify-content:space-between; align-items:center; margin-top:8px; gap:8px; }
  .hide-btn { background:transparent; color:#b98ad4; border:1px solid #5a4470; border-radius:8px; padding:6px 13px; font-size:13px; font-family:inherit; cursor:pointer; }
  .hide-btn:active { background:#241a2b; }
  .reason-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); display:none; align-items:center; justify-content:center; z-index:150; padding:20px; }
  .reason-overlay.show { display:flex; }
  .reason-box { background:var(--card); border-radius:14px; width:100%; max-width:340px; padding:18px 18px 14px; }
  .reason-title { font-size:16px; font-weight:600; margin-bottom:4px; }
  .reason-sub { font-size:13px; color:var(--muted); margin-bottom:14px; line-height:1.5; }
  .reason-list { display:flex; flex-direction:column; gap:6px; }
  .reason-item { background:#15181d; border:1px solid var(--border); border-radius:8px; padding:13px 15px; font-size:15px; cursor:pointer; text-align:left; font-family:inherit; color:var(--text); }
  .reason-item:active { background:#2a2130; border-color:#7d5a94; }
  .reason-cancel { width:100%; background:transparent; color:var(--muted); border:none; padding:12px; font-size:14px; margin-top:8px; cursor:pointer; font-family:inherit; }
  .badge { font-size:12px; padding:3px 11px; border-radius:10px; font-weight:600; white-space:nowrap; }
  .badge.todo { background:var(--amber-soft); color:var(--amber); }
  .badge.done { background:var(--green-soft); color:var(--green-dark); }

  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:flex-end; z-index:100; }
  .overlay.show { display:flex; }
  .sheet { background:var(--card); width:100%; max-height:92%; border-radius:18px 18px 0 0; display:flex; flex-direction:column; }
  .sheet-head { padding:14px 16px 10px; border-bottom:1px solid var(--border); position:relative; }
  .grip { width:36px; height:4px; background:#3a4148; border-radius:2px; margin:0 auto 10px; }
  .stitle { font-size:16.5px; font-weight:600; line-height:1.4; padding-right:30px; }
  .close { position:absolute; top:14px; right:14px; font-size:26px; color:var(--muted); cursor:pointer; }
  .sheet-body { padding:14px 16px calc(14px + env(safe-area-inset-bottom)); overflow-y:auto; overscroll-behavior:contain; }
  .client-line { font-size:14px; color:var(--text); background:rgba(230,189,92,.12); border:1px solid #5a4a1a; padding:8px 12px; border-radius:8px; margin-bottom:10px; }
  .loading-inline { font-size:13px; color:var(--muted); margin-top:8px; font-style:italic; }
  .job-detail { font-size:14px; color:var(--muted); line-height:1.6; background:var(--bg); padding:10px 12px; border-radius:10px; margin-bottom:10px; white-space:pre-wrap; max-height:300px; overflow-y:auto; }
  .sheet-link { display:inline-block; font-size:14px; color:var(--green); text-decoration:none; margin-bottom:14px; }
  .paste-hint { font-size:13px; color:var(--amber); background:var(--amber-soft); padding:10px 12px; border-radius:10px; line-height:1.6; margin-bottom:8px; }
  .paste-area { width:100%; min-height:120px; background:#15181d; color:var(--text); border:1px solid var(--border); border-radius:12px; padding:12px 13px; font-size:14px; line-height:1.6; font-family:inherit; margin-bottom:10px; resize:vertical; }
  .paste-area:focus { outline:none; border-color:var(--green); }
  .gen-btn { width:100%; background:var(--green); color:#04310f; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; }
  .gen-btn:active { filter:brightness(0.95); }
  .gen-btn:disabled { background:#3a4148; }

  .note-msg { background:var(--amber-soft); color:var(--amber); font-size:14px; padding:10px 12px; border-radius:10px; line-height:1.5; margin-bottom:10px; }
  .skip-msg { background:#3a1f1f; color:#f3b4b4; font-size:15px; padding:12px 14px; border-radius:10px; line-height:1.5; }
  .result-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:6px 0 8px; }
  .result-label { font-size:14px; color:var(--muted); }
  .copy-btn-top { background:var(--green); color:#04310f; border:none; border-radius:10px; padding:11px 24px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .copy-btn-top:active { filter:brightness(0.95); }
  .app-text { background:#15181d; border:1px solid var(--border); border-radius:12px; padding:14px 15px; font-size:14.5px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
  .sub-actions { display:flex; gap:8px; margin-top:10px; }
  .mini-btn { flex:1; background:var(--card); color:var(--muted); border:1px solid var(--border); border-radius:10px; padding:11px; font-size:14px; cursor:pointer; font-family:inherit; }
  .mini-btn:active { background:var(--bg); }

  .typing-box { display:flex; gap:5px; justify-content:center; padding:24px; }
  .typing-box span { width:8px; height:8px; border-radius:50%; background:#5a636d; animation:blink 1.2s infinite; }
  .typing-box span:nth-child(2){ animation-delay:0.2s; }
  .typing-box span:nth-child(3){ animation-delay:0.4s; }
  @keyframes blink { 0%,60%,100%{opacity:0.3} 30%{opacity:1} }

  .contract-tag { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:#7ec8ff; background:rgba(80,160,255,.14); border:1px solid rgba(80,160,255,.35); padding:3px 9px; border-radius:6px; margin-top:6px; }
  .contract-warn { background:rgba(80,160,255,.12); border:1px solid rgba(80,160,255,.4); color:#a8d4ff; font-size:14px; padding:11px 13px; border-radius:10px; line-height:1.6; margin-bottom:10px; }
  .contract-warn b { color:#cde7ff; }
  .force-btn { width:100%; background:transparent; color:var(--amber); border:1.5px solid var(--amber); border-radius:12px; padding:12px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:10px; }
  .force-btn:active { background:rgba(230,189,92,.12); }

  .toast { position:fixed; bottom:calc(24px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.82); color:#fff; padding:12px 24px; border-radius:24px; font-size:15px; z-index:200; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .toast.show { opacity:1; }
</style>

  <div style="text-align:center; font-size:11px; color:#4a525c; padding:18px 0 6px;">build 2026-07-13a</div>

<script>
console.log('BUILD_TAG: 2026-07-13a');

// ---------- ③ ロゴ／Castのタップで更新 ----------
document.getElementById('brand').onclick = loadJobs;
function setUpdatedAt(){} // ヘッダー表示は廃止（buildタグは最下部に表示）

// ============================================================
// 設定（ここだけ書き換える）
// ============================================================
const CONFIG = {
  // GASのWebアプリURL（/exec で終わるもの）を貼る
  GAS_URL: 'https://script.google.com/macros/s/AKfycbyKXod-eJoMSsFRLud1QC-OvqmrL4KTxhC9Tvqjp0EeAMwhp1D44hi-yZy6tw-bnsXmJg/exec',
  // GASのスクリプトプロパティ API_TOKEN と同じ文字列を貼る
  TOKEN: 'XJqTnty4gi3xcVp9GjmoPgaayCa5BjOp'
};
// ============================================================

// PWAマニフェスト（単一HTML構成のためJSで注入）
(function(){
  const manifest = {
    name: 'Cast',
    short_name: 'Cast',
    start_url: location.origin + location.pathname,
    display: 'standalone',
    background_color: '#121417',
    theme_color: '#121417',
    icons: [
      { src: location.origin + '/icon-192.png', sizes: '192x192', type: 'image/png', purpose: 'any' },
      { src: location.origin + '/icon-512.png', sizes: '512x512', type: 'image/png', purpose: 'any' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
})();

// ============================================================
// GAS API 通信
// ============================================================
async function api(action, extra){
  const payload = Object.assign({ token: CONFIG.TOKEN, action: action }, extra || {});
  const res = await fetch(CONFIG.GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data && data.error === 'unauthorized') throw new Error('認証エラー：TOKENがGAS側のAPI_TOKENと一致していません');
  return data;
}

function configOk(){
  return CONFIG.GAS_URL.indexOf('https://') === 0 && CONFIG.TOKEN.length > 5 && CONFIG.TOKEN.indexOf('ここに') === -1;
}

// ============================================================
// 画面ロジック
// ============================================================
let JOBS = [];
let filterStatus = 'todo';
let filterGenre = null;

function loadJobs(){
  if(!configOk()){
    document.getElementById('list').innerHTML =
      '<div class="config-warn">⚙️ 初期設定が必要です。<br>index.html 内の CONFIG に GASのURL（/exec）と TOKEN を貼ってから、GitHubにアップロードしてください。</div>';
    return;
  }

  // 前回取得した一覧が端末に残っていれば、まずそれを即表示（体感を高速化）
  let hadCache = false;
  try{
    const saved = localStorage.getItem('cast_jobs');
    if(saved){
      JOBS = JSON.parse(saved);
      render();
      hadCache = true;
      showToastMsg('最新を確認中…');
    }
  }catch(e){}
  if(!hadCache){
    document.getElementById('list').innerHTML = '<div class="loading">案件を読み込み中…</div>';
  }

  // 裏で最新を取得して差し替え
  api('jobs').then(function(data){
    JOBS = (data && data.jobs) || [];
    try{ localStorage.setItem('cast_jobs', JSON.stringify(JOBS)); }catch(e){}
    render();
    if(hadCache) showToastMsg('最新に更新しました');
  }).catch(function(e){
    if(!hadCache){
      document.getElementById('list').innerHTML = '<div class="empty">読み込みエラー：'+esc(String(e.message||e))+'</div>';
    }else{
      showToastMsg('更新に失敗（前回のデータを表示中）');
    }
  });
}

// 今日0時・今週（月曜0時）の境界を返す
function timeBounds(){
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const dow = (now.getDay() + 6) % 7; // 月曜=0
  const weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dow).getTime();
  return { todayStart: todayStart, weekStart: weekStart };
}

function render(){
  const tb = timeBounds();
  // 募集終了（closed）は一覧に一切載せない
  const visible = JOBS.filter(function(j){ return !j.closed; });
  // 全案件・未応募のカウントは期限切れを含めない
  const active = visible.filter(function(j){ return !j.expired; });
  const total = active.length;
  const todo = active.filter(function(j){ return j.status!=='応募済み'; }).length;
  // 今日・今週の応募数（応募日時ベース。週は月曜0時でリセット）
  const applied = JOBS.filter(function(j){ return j.status==='応募済み' && j.appliedTs; });
  const week = applied.filter(function(j){ return j.appliedTs >= tb.weekStart; }).length;
  const today = applied.filter(function(j){ return j.appliedTs >= tb.todayStart; }).length;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-todo').textContent = todo;
  document.getElementById('s-week').textContent = week;
  document.getElementById('s-today').textContent = today;

  let shown = visible.slice();
  if(filterStatus==='all') shown = shown.filter(function(j){return !j.expired;});
  if(filterStatus==='todo') shown = shown.filter(function(j){return j.status!=='応募済み' && !j.expired;});
  if(filterStatus==='done') shown = shown.filter(function(j){return j.status==='応募済み';});
  if(filterStatus==='week') shown = shown.filter(function(j){return j.status==='応募済み' && j.appliedTs && j.appliedTs >= timeBounds().weekStart;});
  if(filterStatus==='today') shown = shown.filter(function(j){return j.status==='応募済み' && j.appliedTs && j.appliedTs >= timeBounds().todayStart;});
  if(filterGenre) shown = shown.filter(function(j){return j.genre===filterGenre;});

  const list = document.getElementById('list');
  if(shown.length===0){ list.innerHTML='<div class="empty">該当する案件はありません</div>'; return; }

  list.innerHTML='';
  shown.forEach(function(j){
    const applied = j.status==='応募済み';
    const card = document.createElement('div');
    card.className='card'+(applied?' applied':'');
    const badge = applied ? '<span class="badge done">応募済み</span>' : '<span class="badge todo">未応募</span>';
    const clientLine = j.clientName
      ? '<div class="card-client">👤 '+esc(j.clientName)+(j.certified?' <span class="cert-mark">認定</span>':'')+'</div>'
      : '';
    const contractTag = j.contract ? '<div class="contract-tag">🤝 契約歴あり（'+esc(j.contract)+'）</div>' : '';
    card.innerHTML =
      '<div class="card-top"><span class="platform">'+esc(j.platform)+'</span>'+badge+'</div>'+
      '<div class="title">'+esc(j.title)+'</div>'+
      clientLine+contractTag+
      '<div class="meta"><span>💰 '+esc(j.reward||'応相談')+'</span><span>📅 〜'+esc(j.deadline)+'</span><span>'+esc(j.entry||'')+'</span></div>'+
      '<div class="card-foot"><span class="genre-tag">'+esc(j.genre)+'</span><button class="hide-btn" data-row="'+j.row+'">非表示</button></div>';
    card.onclick = function(e){
      if(e.target && e.target.classList.contains('hide-btn')){
        e.stopPropagation();
        openHideMenu(j);
        return;
      }
      openSheet(j);
    };
    list.appendChild(card);
  });
}

function setStatusFilter(f){
  filterStatus = f;
  document.querySelectorAll('.fbtn[data-f]').forEach(function(b){
    b.classList.toggle('active', b.dataset.f===f);
  });
  document.querySelectorAll('.stat').forEach(function(s){
    s.classList.toggle('active', s.dataset.sf===f);
  });
  render();
}
document.querySelectorAll('.stat').forEach(function(s){
  s.onclick = function(){ setStatusFilter(s.dataset.sf); };
});

document.querySelectorAll('.fbtn').forEach(function(btn){
  btn.onclick = function(){
    if(btn.dataset.f){
      setStatusFilter(btn.dataset.f);
      return;
    } else if(btn.dataset.g){
      if(filterGenre===btn.dataset.g){ filterGenre=null; btn.classList.remove('active'); }
      else {
        document.querySelectorAll('.fbtn[data-g]').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active'); filterGenre=btn.dataset.g;
      }
    }
    render();
  };
});

const overlay = document.getElementById('overlay');
let currentJob = null;

function isLancers(job){ return String(job.platform||'').indexOf('ランサーズ') !== -1; }

function openSheet(job){
  currentJob = job;
  document.getElementById('sheet-title').textContent = job.title;
  const lancers = isLancers(job);
  // 初期表示：概要＋ローディング表示。詳細は非同期で差し替え
  // 一覧で取得済みのクライアント名があれば、開いた瞬間にそれを表示する
  let html = '';
  if(job.contract){
    html += contractWarnHtml(job.contract, job.contractMemo);
  }
  if(job.clientName){
    html += '<div id="client-line" class="client-line">👤 ' + esc(job.clientName) + (job.certified ? ' <span class="cert-mark">認定</span>' : '') + '</div>';
  } else if(!lancers){
    html += '<div id="client-line" class="client-line">👤 クライアント名を取得中…</div>';
  }
  html += '<div id="full-body" class="job-detail">'+esc(job.summary||'（概要なし）')
        + (lancers ? '' : '<div class="loading-inline">📄 募集文の全文を読み込み中…</div>')
        + '</div>';
  html += '<a class="sheet-link" href="'+esc(job.url)+'" target="_blank" rel="noopener">🔗 案件ページを開く</a>';
  if(lancers){
    // ランサーズは自動取得不可のため、募集本文の手動貼り付けで生成の質を上げる
    html += '<div class="paste-hint">📋 ランサーズは募集文を自動取得できません。上のリンクから案件ページを開き、募集本文をコピーして下に貼り付けると、内容に沿った応募文を作成できます（貼り付けなしでも概要だけで作成可能）。</div>';
    html += '<textarea class="paste-area" id="paste-area" placeholder="ここに募集本文を貼り付け（任意）"></textarea>';
  }
  if(job.status==='応募済み' && job.body){
    html += renderResult(job.body, true, job.note);
  } else {
    html += '<button class="gen-btn" id="genbtn">この案件の応募文を作成</button>';
  }
  document.getElementById('sheet-body').innerHTML = html;
  overlay.classList.add('show');
  document.body.classList.add('modal-open');
  bindSheetButtons();

  if(lancers) return; // ランサーズは自動取得しない

  // 非同期で全文＋クライアント名を取得して表示を差し替え
  api('detail', { url: job.url }).then(function(detail){
    if(!detail) return;
    if(detail.contract && !document.getElementById('contract-warn')){
      currentJob.contract = detail.contract;
      currentJob.contractMemo = detail.contractMemo || '';
      const sb = document.getElementById('sheet-body');
      if(sb) sb.insertAdjacentHTML('afterbegin', contractWarnHtml(detail.contract, detail.contractMemo));
    }
    const cl = document.getElementById('client-line');
    if(cl){
      // 個別ページの名前を優先。取れなければ一覧で取得済みの名前を残す
      const name = detail.client || job.clientName || '';
      if(name){
        cl.innerHTML = '👤 ' + esc(name) + (job.certified ? ' <span class="cert-mark">認定</span>' : '');
      } else {
        cl.textContent = '👤 クライアント名：取得できませんでした';
      }
    }
    const fb = document.getElementById('full-body');
    if(fb && detail.body){
      fb.textContent = detail.body;
    } else if(fb && !detail.body){
      fb.textContent = (job.summary || '') + '\n\n（全文は取得できなかったため概要を表示しています）';
    }
  }).catch(function(){
    const cl = document.getElementById('client-line');
    if(cl && job.clientName){
      cl.innerHTML = '👤 ' + esc(job.clientName) + (job.certified ? ' <span class="cert-mark">認定</span>' : '');
    } else if(cl){
      cl.textContent = '👤 クライアント名：取得失敗';
    }
  });
}

function renderResult(body, applied, note){
  let html='';
  if(note) html += '<div class="note-msg">📝 操作メモ：'+esc(note)+'</div>';
  if(body.indexOf('【応募不可】')===0){
    return '<div class="skip-msg">⚠️ '+esc(body.replace('【応募不可】',''))+'<br><span style="font-size:12.5px;opacity:.85;">AIが応募不可と判断しましたが、内容を確認のうえ応募することもできます。</span></div>'
      + '<button class="force-btn" id="forcebtn">それでも応募文を作成する</button>';
  }
  html += '<div class="result-head"><span class="result-label">✅ 応募文'+(applied?'（応募済み）':'（作成しました）')+'</span><button class="copy-btn-top" id="copybtn">コピー</button></div>';
  html += '<div class="app-text" id="apptext">'+esc(body)+'</div>';
  html += '<div class="sub-actions"><button class="mini-btn" id="regenbtn">作り直す</button>';
  if(applied) html += '<button class="mini-btn" id="undobtn">未応募に戻す</button>';
  html += '</div>';
  return html;
}

function bindSheetButtons(){
  const g=document.getElementById('genbtn');
  if(g) g.onclick=doGenerate;
  const c=document.getElementById('copybtn');
  if(c) c.onclick=function(){ copyText(currentJob.body); };
  const r=document.getElementById('regenbtn');
  if(r) r.onclick=doRegenerate;
  const u=document.getElementById('undobtn');
  if(u) u.onclick=doUndo;
  const f=document.getElementById('forcebtn');
  if(f) f.onclick=doForceGenerate;
}

function contractWarnHtml(status, memo){
  return '<div id="contract-warn" class="contract-warn">🤝 <b>契約歴のあるクライアントです（'+esc(status)+'）</b>'
    + (memo ? '<br>'+esc(memo) : '') + '</div>';
}

function getPastedText(){
  const ta = document.getElementById('paste-area');
  return ta ? ta.value.trim() : '';
}
function doGenerate(){
  if(currentJob.contract && !confirm('契約歴のあるクライアント（'+currentJob.contract+'）です。\n応募文を作成しますか？')) return;
  const pasted = getPastedText();
  showTyping();
  api('generate', { row: currentJob.row, pasted: pasted }).then(handleResult).catch(failHandler);
}
function doForceGenerate(){
  const pasted = getPastedText();
  showTyping();
  api('regenerate', { row: currentJob.row, pasted: pasted, force: 1 }).then(handleResult).catch(failHandler);
}
function doRegenerate(){
  const pasted = getPastedText();
  showTyping();
  api('regenerate', { row: currentJob.row, pasted: pasted }).then(handleResult).catch(failHandler);
}
function doUndo(){
  api('unapply', { row: currentJob.row }).then(function(){
    currentJob.status='未応募'; currentJob.body='';
    const idx=JOBS.findIndex(function(j){return j.row===currentJob.row;});
    if(idx>=0){ JOBS[idx].status='未応募'; JOBS[idx].body=''; }
    saveLocalJobs();
    render(); openSheet(currentJob);
  }).catch(failHandler);
}

function showTyping(){
  document.getElementById('sheet-body').innerHTML =
    '<div class="job-detail">'+esc(currentJob.summary||'')+'</div>'+
    '<a class="sheet-link" href="'+esc(currentJob.url)+'" target="_blank" rel="noopener">🔗 案件ページを開く</a>'+
    '<div class="typing-box"><span></span><span></span><span></span></div>';
}
function saveLocalJobs(){ try{ localStorage.setItem('cast_jobs', JSON.stringify(JOBS)); }catch(e){} }

function handleResult(res){
  if(res.error){
    document.getElementById('sheet-body').innerHTML += '<div class="skip-msg">エラー：'+esc(res.error)+'</div>';
    return;
  }
  currentJob.body=res.body; currentJob.status=res.status; currentJob.note=res.note||'';
  const idx=JOBS.findIndex(function(j){return j.row===currentJob.row;});
  if(idx>=0){ JOBS[idx].status=res.status; JOBS[idx].body=res.body; JOBS[idx].note=res.note||''; }
  saveLocalJobs();
  document.getElementById('sheet-body').innerHTML =
    '<div class="job-detail">'+esc(currentJob.summary||'')+'</div>'+
    '<a class="sheet-link" href="'+esc(currentJob.url)+'" target="_blank" rel="noopener">🔗 案件ページを開く</a>'+
    (isLancers(currentJob) ? '<textarea class="paste-area" id="paste-area" placeholder="作り直す場合：募集本文を貼り付け（任意）"></textarea>' : '')+
    renderResult(res.body, true, res.note);
  bindSheetButtons();
  render();
}
function failHandler(e){
  document.getElementById('sheet-body').innerHTML += '<div class="skip-msg">通信エラー：'+esc(String(e.message||e))+'</div>';
}

function closeSheet(){ overlay.classList.remove('show'); document.body.classList.remove('modal-open'); }
overlay.onclick=function(e){ if(e.target===overlay) closeSheet(); };

// 非表示メニュー
let hideTargetJob = null;
const reasonOverlay = document.getElementById('reason-overlay');
function openHideMenu(job){
  hideTargetJob = job;
  document.getElementById('reason-target').textContent = job.title;
  reasonOverlay.classList.add('show');
}
function closeHideMenu(){
  reasonOverlay.classList.remove('show');
  hideTargetJob = null;
}
reasonOverlay.onclick = function(e){ if(e.target===reasonOverlay) closeHideMenu(); };
document.querySelectorAll('.reason-item').forEach(function(btn){
  btn.onclick = function(){
    if(!hideTargetJob) return;
    const reason = btn.dataset.r;
    const row = hideTargetJob.row;
    const url = hideTargetJob.url;
    // ローカルでも即座に消す（再読み込みなしで反映）
    JOBS = JOBS.filter(function(x){ return x.url !== url; });
    saveLocalJobs();
    closeHideMenu();
    render();
    showToastMsg('非表示にしました');
    api('hide', { row: row, reason: reason }).catch(function(){
      showToastMsg('保存に失敗しました');
    });
  };
});

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showToast).catch(function(){ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); showToast(); }catch(e){}
  document.body.removeChild(ta);
}
const toast=document.getElementById('toast');
function showToast(){ toast.textContent='コピーしました！'; toast.classList.add('show'); setTimeout(function(){toast.classList.remove('show');},1500); }
function showToastMsg(msg){ toast.textContent=msg; toast.classList.add('show'); setTimeout(function(){toast.classList.remove('show');},1500); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadJobs();
</script>
</body>
